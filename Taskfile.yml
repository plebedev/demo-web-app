version: "3"

tasks:
  install:
    cmds:
      - npm install

  dev:
    cmds:
      - npm run dev

  lint:
    cmds:
      - npm run lint

  verify:
    cmds:
      - npm run lint
      - npm run typecheck
      - npm run test
      - npm run build

  test:
    cmds:
      - npm run test

  build:
    cmds:
      - npm run build

  docker-build:
    cmds:
      - IMAGE_REPOSITORY="${IMAGE_REPOSITORY:-frontend-bff}" IMAGE_TAG="${IMAGE_TAG:-}" bash ./deploy/scripts/build-image.sh

  ship-deploy:
    cmds:
      - RELEASE_NAME="${RELEASE_NAME:-frontend-bff}" NAMESPACE="${NAMESPACE:-demo}" VALUES_FILE="${VALUES_FILE:-deploy/helm/frontend-bff/values-demo.yaml}" IMAGE_REPOSITORY="${IMAGE_REPOSITORY:-frontend-bff}" DEPLOY_TARGET="${DEPLOY_TARGET:-ubuntu@openclaw}" DEPLOY_PATH="${DEPLOY_PATH:-/home/ubuntu/frontend-bff-deploy}" SSH_OPTS="${SSH_OPTS:-}" KEEP_REMOTE_RELEASES="${KEEP_REMOTE_RELEASES:-3}" bash ./deploy/scripts/ship-deploy.sh

  rollback:
    cmds:
      - RELEASE_NAME="${RELEASE_NAME:-frontend-bff}" NAMESPACE="${NAMESPACE:-demo}" REVISION="${REVISION:-}" bash ./deploy/scripts/rollback.sh

  history:
    cmds:
      - helm history "${RELEASE_NAME:-frontend-bff}" --namespace "${NAMESPACE:-demo}"

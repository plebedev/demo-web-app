namespace: demo

replicaCount: 1

image:
  repository: frontend-bff
  tag: "dev"
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 80
  targetPort: 3000

ingress:
  enabled: true
  className: traefik
  host: demo.lebedev.ai
  annotations: {}
  path: /
  pathType: Prefix

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 300m
    memory: 256Mi

probes:
  path: /api/health
  initialDelaySeconds: 10
  periodSeconds: 10
  timeoutSeconds: 2
  failureThreshold: 3

env:
  PORT: "3000"
  APP_NAME: "Invite-Only Demo"
  NEXT_PUBLIC_APP_NAME: "Invite-Only Demo"
  NEXT_PUBLIC_STAGE: "default"
  BACKEND_BASE_URL: ""
  BACKEND_LOCAL_URL: ""
  BACKEND_CLUSTER_URL: "http://backend-api.demo.svc.cluster.local/api"
  NEXT_PUBLIC_MAX_FILES_PER_RUN: "3"
  NEXT_PUBLIC_MAX_FILE_SIZE_BYTES: "5242880"
  NEXT_PUBLIC_MAX_EXTRACTED_TEXT_BYTES: "250000"
  NEXT_PUBLIC_MAX_TOTAL_WORKFLOW_TEXT_BYTES: "400000"

podAnnotations: {}

nameOverride: ""
fullnameOverride: ""
